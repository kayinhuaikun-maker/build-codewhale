name: Build CodeWhale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: x86_64-unknown-linux-musl

      - name: Build codewhale binaries
        run: |
          cargo install codewhale-cli --locked --root ./output --target x86_64-unknown-linux-musl
          cargo install codewhale-tui --locked --root ./output --target x86_64-unknown-linux-musl

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: codewhale-linux-x64-musl
          path: output/bin/
          retention-days: 7
