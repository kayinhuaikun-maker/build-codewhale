name: Build CodeWhale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Build codewhale binaries
        run: |
          cargo install codewhale-cli --locked --root ./output
          cargo install codewhale-tui --locked --root ./output

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: codewhale-linux-x64
          path: output/bin/
          retention-days: 7
